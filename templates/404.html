{% extends "base.html" %}

{% block title %}Page Not Found - Chatlet{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-6 bg-gray-50 dark:bg-dark-950">
    <div class="text-center max-w-md">
        <!-- Animated illustration -->
        <div class="mb-8 relative">
            <div class="w-48 h-48 mx-auto bg-primary-100 dark:bg-primary-900/20 rounded-full flex items-center justify-center error-icon">
                <i data-lucide="message-circle-x" class="w-24 h-24 text-primary-500"></i>
            </div>
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-48 bg-primary-500/20 rounded-full blur-3xl -z-10"></div>
        </div>
        
        <h1 class="text-6xl font-bold gradient-text mb-4 error-title">404</h1>
        <h2 class="text-2xl font-semibold text-gray-900 dark:text-white mb-2 error-subtitle">Page Not Found</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-8 error-text">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center error-buttons">
            <a href="{{ url_for('chat') }}" class="px-6 py-3 bg-primary-500 hover:bg-primary-600 text-white font-semibold rounded-xl shadow-lg shadow-primary-500/30 hover:shadow-primary-500/40 transition-all btn-hover flex items-center justify-center gap-2">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span>Go to Chat</span>
            </a>
            <a href="{{ url_for('login') }}" class="px-6 py-3 bg-white dark:bg-dark-800 hover:bg-gray-50 dark:hover:bg-dark-700 text-gray-700 dark:text-gray-300 font-medium rounded-xl border border-gray-200 dark:border-dark-700 transition-colors flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-5 h-5"></i>
                <span>Sign In</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    if (window.gsap) {
        gsap.from('.error-icon', {
            scale: 0,
            rotation: -180,
            duration: 1,
            ease: 'elastic.out(1, 0.5)'
        });
        
        gsap.from('.error-title', {
            y: 30,
            opacity: 0,
            duration: 0.6,
            delay: 0.3
        });
        
        gsap.from('.error-subtitle', {
            y: 30,
            opacity: 0,
            duration: 0.6,
            delay: 0.4
        });
        
        gsap.from('.error-text', {
            y: 30,
            opacity: 0,
            duration: 0.6,
            delay: 0.5
        });
        
        gsap.from('.error-buttons a', {
            y: 30,
            opacity: 0,
            duration: 0.6,
            stagger: 0.1,
            delay: 0.6
        });
    }
</script>
{% endblock %}
